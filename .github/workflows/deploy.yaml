name: Deploy
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}
jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/astronomer-starship
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.10'
          cache: 'pip'
      - uses: extractions/setup-just@v4
      - run: just build
      - uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          skip-existing: true

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true

  publish-docs:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install -c constraints.txt '.[docs]'
      - run: mkdocs gh-deploy --force
