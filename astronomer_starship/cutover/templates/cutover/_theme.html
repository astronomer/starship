<style>
/* ============================================================
   Starship Cutover Theme
   Aligned with Astronomer Starship React (Chakra UI) design
   Scoped under .mc-wrap to avoid bleeding into Airflow UI
   ============================================================ */

/* --- Fonts (system stack — no external requests, works in air-gapped envs) --- */
.mc-wrap {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
  color: #2B215B;
  font-size: 14px;
  line-height: 1.5;
}

/* --- Branded Header --- */
.mc-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 8px;
}
.mc-header-text h1 {
  font-size: 28px;
  font-weight: 700;
  color: #2B215B;
  margin: 0 0 2px 0;
  line-height: 1.2;
}
.mc-header-byline {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  color: #8887C0;
  font-size: 12px;
}
.mc-header-byline svg {
  height: 11px;
  width: auto;
}
.mc-divider {
  border: none;
  border-top: 1px solid #DCDBF1;
  margin: 16px 0;
}

/* --- Headings & Text --- */
.mc-wrap h2 {
  color: #2B215B;
  font-weight: 700;
  font-size: 20px;
  margin-bottom: 4px;
}
.mc-wrap h4 {
  color: #2B215B;
  font-weight: 600;
  font-size: 16px;
}
.mc-wrap a { color: #575293; }
.mc-wrap a:hover { color: #413A77; text-decoration: none; }
.mc-wrap .text-muted { color: #8887C0; font-size: 13px; }

/* --- Labels / Badges (pill style like Chakra Tag) --- */
.mc-wrap .label {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  vertical-align: middle;
}
.mc-wrap .label-primary   { background-color: #575293; color: #fff; }
.mc-wrap .label-success   { background-color: #06AC80; color: #fff; }
.mc-wrap .label-danger    { background-color: #D22E16; color: #fff; }
.mc-wrap .label-warning   { background-color: #D38B1D; color: #fff; }
.mc-wrap .label-info      { background-color: #0F74D5; color: #fff; }
.mc-wrap .label-default   { background-color: #EBE9F8; color: #575293; }

/* --- Buttons: shared base (Chakra-like) --- */
.mc-wrap .btn {
  font-family: inherit;
  font-weight: 600;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: all 0.15s ease;
  cursor: pointer;
  line-height: 1.4;
  letter-spacing: 0.2px;
}
.mc-wrap .btn-lg {
  padding: 10px 24px;
  font-size: 15px;
  border-radius: 8px;
}
.mc-wrap .btn-sm {
  padding: 4px 12px;
  font-size: 13px;
}
.mc-wrap .btn-xs {
  padding: 3px 10px;
  font-size: 12px;
  border-radius: 5px;
}

/* --- Buttons: Primary (brand purple, solid) --- */
.mc-wrap .btn-primary {
  background-color: #575293;
  border-color: #575293;
  color: #fff;
}
.mc-wrap .btn-primary:hover,
.mc-wrap .btn-primary:focus {
  background-color: #413A77;
  border-color: #413A77;
  color: #fff;
  box-shadow: 0 1px 3px rgba(87, 82, 147, 0.3);
}

/* --- Buttons: Info (blue, solid) --- */
.mc-wrap .btn-info {
  background-color: #0F74D5;
  border-color: #0F74D5;
  color: #fff;
}
.mc-wrap .btn-info:hover,
.mc-wrap .btn-info:focus {
  background-color: #1552AC;
  border-color: #1552AC;
  color: #fff;
  box-shadow: 0 1px 3px rgba(15, 116, 213, 0.3);
}

/* --- Buttons: Danger (error red, solid) --- */
.mc-wrap .btn-danger {
  background-color: #D22E16;
  border-color: #D22E16;
  color: #fff;
}
.mc-wrap .btn-danger:hover,
.mc-wrap .btn-danger:focus {
  background-color: #AA2607;
  border-color: #AA2607;
  color: #fff;
  box-shadow: 0 1px 3px rgba(210, 46, 22, 0.3);
}

/* --- Buttons: Warning (amber, solid) --- */
.mc-wrap .btn-warning {
  background-color: #D38B1D;
  border-color: #D38B1D;
  color: #fff;
}
.mc-wrap .btn-warning:hover,
.mc-wrap .btn-warning:focus {
  background-color: #AA7016;
  border-color: #AA7016;
  color: #fff;
  box-shadow: 0 1px 3px rgba(211, 139, 29, 0.3);
}

/* --- Buttons: Default (outline, brand border like Chakra outline variant) --- */
.mc-wrap .btn-default {
  background-color: #fff;
  border-color: #BDBFE2;
  color: #575293;
}
.mc-wrap .btn-default:hover,
.mc-wrap .btn-default:focus {
  background-color: #F8F8FF;
  border-color: #575293;
  color: #413A77;
}

/* --- Buttons: Purge (dark brand, destructive) --- */
.mc-wrap .btn-purge {
  background-color: #1E1D48;
  border-color: #1E1D48;
  color: #fff;
}
.mc-wrap .btn-purge:hover,
.mc-wrap .btn-purge:focus {
  background-color: #101935;
  border-color: #101935;
  color: #fff;
  box-shadow: 0 1px 3px rgba(30, 29, 72, 0.3);
}

/* --- Tables (match Chakra striped variant) --- */
.mc-wrap .table {
  border-collapse: separate;
  border-spacing: 0;
}
.mc-wrap .table > thead > tr > th {
  background-color: transparent;
  color: #8887C0;
  border-bottom: 1px solid #BDBFE2;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  padding: 8px 12px;
}
.mc-wrap .table-striped > tbody > tr:nth-of-type(odd) {
  background-color: #F8F8FF;
}
.mc-wrap .table-striped > tbody > tr:nth-of-type(even) {
  background-color: transparent;
}
.mc-wrap .table-hover > tbody > tr:hover {
  background-color: #EBE9F8;
}
.mc-wrap .table > tbody > tr > td {
  border-top-color: #EBE9F8;
  padding: 8px 12px;
  font-size: 13px;
  vertical-align: middle;
}

/* --- Progress Bar --- */
.mc-wrap .progress {
  background-color: #EBE9F8;
  border-radius: 999px;
  overflow: hidden;
  height: 8px;
}
.mc-wrap .progress-bar-success {
  background-color: #06AC80;
}
.mc-wrap .progress-bar-danger {
  background-color: #D22E16;
}
.mc-wrap .progress-bar-default {
  background-color: #A2A3D1;
}

/* --- Panels (Advanced Options — card-like) --- */
.mc-wrap .panel-default {
  border: 1px solid #DCDBF1;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: none;
}
.mc-wrap .panel-default > .panel-heading {
  background-color: #F8F8FF;
  color: #2B215B;
  border-bottom: 1px solid #DCDBF1;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 16px;
}
.mc-wrap .panel-default > .panel-body {
  padding: 16px;
}

/* --- Forms --- */
.mc-wrap .form-group label {
  font-weight: 600;
  color: #2B215B;
  font-size: 13px;
  margin-bottom: 4px;
}
.mc-wrap .form-control {
  border: 1px solid #BDBFE2;
  border-radius: 6px;
  font-size: 14px;
  padding: 8px 12px;
  color: #2B215B;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.mc-wrap .form-control:focus {
  border-color: #575293;
  box-shadow: 0 0 0 3px rgba(87, 82, 147, 0.12);
  outline: none;
}
.mc-wrap .help-block {
  color: #8887C0;
  font-size: 12px;
  margin-top: 4px;
}
.mc-wrap .checkbox label {
  font-weight: 500;
  color: #2B215B;
  font-size: 13px;
}

/* --- Alerts --- */
.mc-wrap .alert {
  border-radius: 8px;
  border-width: 1px;
  font-size: 13px;
}
.mc-wrap .alert-warning {
  background-color: #FFF6EB;
  border-color: #D38B1D;
  color: #805512;
}
.mc-wrap .alert-danger {
  background-color: #FFE9E0;
  border-color: #D22E16;
  color: #812101;
}
.mc-wrap .alert-success {
  background-color: #F2FFF8;
  border-color: #06AC80;
  color: #076953;
}

/* --- Status text --- */
.mc-wrap .text-success { color: #06AC80; }
.mc-wrap .text-danger  { color: #D22E16; }
.mc-wrap .text-warning { color: #D38B1D; }
.mc-wrap .text-info    { color: #0F74D5; }

/* --- Code elements --- */
.mc-wrap code {
  color: #413A77;
  background-color: #EBE9F8;
  border: 1px solid #DCDBF1;
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 12px;
  font-family: "SF Mono", "Roboto Mono", "Courier New", monospace;
}

/* --- Section dividers --- */
.mc-wrap hr {
  border-top-color: #DCDBF1;
}

/* --- Action button row --- */
.mc-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin: 20px 0;
}

/* --- Preparing overlay --- */
.mc-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.92);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 16px;
  font-family: inherit;
}
.mc-overlay.active { display: flex; }
.mc-overlay h2 { color: #2B215B; margin: 0; }
.mc-overlay p { color: #8887C0; font-size: 15px; margin: 0; }
.mc-overlay-emoji { font-size: 48px; }
@keyframes mc-spin {
  to { transform: rotate(360deg); }
}
.mc-spinner {
  width: 36px; height: 36px;
  border: 4px solid #EBE9F8;
  border-top-color: #575293;
  border-radius: 50%;
  animation: mc-spin 0.8s linear infinite;
}
</style>

{# Preparing overlay — activated by forms with class="mc-preparing-form" #}
<div class="mc-overlay" id="mc-preparing-overlay">
  <div class="mc-overlay-emoji">&#x1F6E0;&#xFE0F; &#x1F680;</div>
  <h2>Preparing cutover!</h2>
  <p>Resolving DAGs from source and setting up the migration&hellip;</p>
  <div class="mc-spinner"></div>
</div>
<script>
(function() {
  document.querySelectorAll('.mc-preparing-form').forEach(function(form) {
    form.addEventListener('submit', function() {
      document.getElementById('mc-preparing-overlay').classList.add('active');
    });
  });
})();
</script>
